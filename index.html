<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Tic Tac Toe | Pro Edition</title>
    <meta name="description" content="A professional, beautiful, and interactive Tic Tac Toe game for two players. Features neon design, score tracking, and smooth animations.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --player-x: #00d2ff;
            --player-o: #ff007a;
            --text-color: #ffffff;
            --accent-color: #7d5fff;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            color: var(--text-color);
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #00d2ff, #7d5fff, #ff007a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Scoreboard */
        .scoreboard {
            display: flex;
            justify-content: space-around;
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 16px;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .score-label {
            font-size: 0.75rem;
            font-weight: 600;
            opacity: 0.6;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .score-item.player-x .score-value { color: var(--player-x); text-shadow: 0 0 10px rgba(0, 210, 255, 0.5); }
        .score-item.player-o .score-value { color: var(--player-o); text-shadow: 0 0 10px rgba(255, 0, 122, 0.5); }

        /* Game Status */
        .status-container {
            margin-bottom: 1.5rem;
            height: 30px;
        }

        #status-text {
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .current-x { color: var(--player-x); }
        .current-o { color: var(--player-o); }

        /* Board */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 2rem;
            perspective: 1000px;
        }

        .cell {
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.05) translateZ(10px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .cell.occupied {
            cursor: default;
        }

        .cell.win-cell {
            background: rgba(125, 95, 255, 0.2);
            border-color: var(--accent-color);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1.05); }
            to { transform: scale(1.1); box-shadow: 0 0 20px rgba(125, 95, 255, 0.4); }
        }

        .cell span {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .symbol-x { color: var(--player-x); text-shadow: 0 0 15px rgba(0, 210, 255, 0.6); }
        .symbol-o { color: var(--player-o); text-shadow: 0 0 15px rgba(255, 0, 122, 0.6); }

        /* Controls */
        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        button {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 12px;
            background: var(--accent-color);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(125, 95, 255, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 6px 20px rgba(125, 95, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            box-shadow: none;
        }

        button.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Responsive */
        @media (max-width: 400px) {
            .container {
                padding: 1.5rem;
            }
            h1 { font-size: 2rem; }
            .cell { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tic Tac Toe</h1>
        <p class="subtitle">Ultimate Pro Edition</p>

        <div class="scoreboard">
            <div class="score-item player-x">
                <span class="score-label">PLAYER X</span>
                <span id="score-x" class="score-value">0</span>
            </div>
            <div class="score-item player-o">
                <span class="score-label">PLAYER O</span>
                <span id="score-o" class="score-value">0</span>
            </div>
        </div>

        <div class="status-container">
            <div id="status-text" class="current-x">PLAYER X'S TURN</div>
        </div>

        <div class="board" id="board">
            <!-- Cells generated by JS -->
        </div>

        <div class="controls">
            <button id="reset-btn">New Round</button>
            <button id="clear-btn" class="secondary">Reset Match</button>
        </div>
        <p style="margin-top: 8rem; font-size: 0.8rem;">Copyright © 2026 ayudia putri rahayu.</p>
    </div>

    <script>
        const boardElement = document.getElementById('board');
        const statusText = document.getElementById('status-text');
        const scoreXElement = document.getElementById('score-x');
        const scoreOElement = document.getElementById('score-o');
        const resetBtn = document.getElementById('reset-btn');
        const clearBtn = document.getElementById('clear-btn');

        let board = Array(9).fill("");
        let currentPlayer = "X";
        let gameActive = true;
        let scoreX = 0;
        let scoreO = 0;

        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        function initGame() {
            boardElement.innerHTML = "";
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.setAttribute('data-index', i);
                cell.addEventListener('click', () => handleCellClick(cell, i));
                boardElement.appendChild(cell);
            }
            updateStatus();
        }

        function handleCellClick(cell, index) {
            if (board[index] !== "" || !gameActive) return;

            board[index] = currentPlayer;
            cell.innerHTML = `<span class="symbol-${currentPlayer.toLowerCase()}">${currentPlayer}</span>`;
            cell.classList.add('occupied');

            checkResult();
        }

        function checkResult() {
            let roundWon = false;
            let winningCombo = [];

            for (let i = 0; i < winConditions.length; i++) {
                const [a, b, c] = winConditions[i];
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    roundWon = true;
                    winningCombo = [a, b, c];
                    break;
                }
            }

            if (roundWon) {
                highlightWinningCells(winningCombo);
                statusText.innerText = `PLAYER ${currentPlayer} WINS!`;
                statusText.className = `current-${currentPlayer.toLowerCase()}`;
                updateScore(currentPlayer);
                gameActive = false;
                return;
            }

            if (!board.includes("")) {
                statusText.innerText = "IT'S A DRAW!";
                statusText.className = "";
                gameActive = false;
                return;
            }

            currentPlayer = currentPlayer === "X" ? "O" : "X";
            updateStatus();
        }

        function highlightWinningCells(combo) {
            combo.forEach(index => {
                const cell = boardElement.children[index];
                cell.classList.add('win-cell');
            });
        }

        function updateStatus() {
            statusText.innerText = `PLAYER ${currentPlayer}'S TURN`;
            statusText.className = `current-${currentPlayer.toLowerCase()}`;
        }

        function updateScore(winner) {
            if (winner === "X") {
                scoreX++;
                scoreXElement.innerText = scoreX;
            } else {
                scoreO++;
                scoreOElement.innerText = scoreO;
            }
        }

        function resetRound() {
            board = Array(9).fill("");
            gameActive = true;
            currentPlayer = "X";
            initGame();
        }

        function resetMatch() {
            scoreX = 0;
            scoreO = 0;
            scoreXElement.innerText = "0";
            scoreOElement.innerText = "0";
            resetRound();
        }

        resetBtn.addEventListener('click', resetRound);
        clearBtn.addEventListener('click', resetMatch);

        // Start the game
        initGame();
    </script>
</body>
</html>
